<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background:#F7F4F0;">
<div style="max-width:640px;margin:40px auto;background:#FFFFFF;padding:48px 40px 60px;box-shadow:0 2px 20px rgba(0,0,0,0.06);font-family:'PingFang SC','Microsoft YaHei',serif;">

<!-- 标题 -->
<h1 style="font-size:26px;font-weight:600;color:#2D3436;text-align:center;line-height:1.5;margin:0 0 12px;letter-spacing:0.5px;">{{TITLE}}</h1>

<!-- 副标题 -->
<p style="text-align:center;color:#9B8B7A;font-size:14px;margin:0 0 36px;letter-spacing:1px;font-style:italic;">{{LEAD}}</p>

<!-- 装饰线 -->
<div style="display:flex;align-items:center;justify-content:center;margin-bottom:36px;">
<span style="display:inline-block;width:40px;height:1px;background:#C4A87C;"></span>
<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#C4A87C;margin:0 12px;"></span>
<span style="display:inline-block;width:40px;height:1px;background:#C4A87C;"></span>
</div>

<!-- 正文内容 -->
{{CONTENT}}

<!-- 装饰底标 -->
<div style="text-align:center;margin-top:32px;color:#C4A87C;font-size:12px;letter-spacing:2px;">&#10023; &#10023; &#10023;</div>

</div>
</body>
</html>
